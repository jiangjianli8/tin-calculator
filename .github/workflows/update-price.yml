name: Update Tin Price

on:
  schedule:
    - cron: '*/5 1-7,13-15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install akshare
      - name: Fetch tin price
        run: python scripts/fetch-tin-price.py
      - name: Commit and push
        run: |
          if [[ -n $(git status data/price.json --porcelain) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/price.json
            git commit -m "auto: 更新沪锡期货行情 $(date +%Y-%m-%d_%H:%M)"
            git push
          else
            echo "No changes to commit"
          fi
