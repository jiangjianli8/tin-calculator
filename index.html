<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>锡矿石计价器 · 鑫善源 ⬜</title>
<style>

:root {
  --bg: #0a0a0f;
  --card: #1a1a25;
  --card2: #22222e;
  --text: #ffffff;
  --text2: #a0a0c0;
  --primary: #8a9bb5;
  --primary-light: #b0c4de;
  --primary-dark: #4a5568;
  --gold: #b0c4de;
  --accent: #a0a0c0;
  --danger: #ff4466;
  --border: #2a2a3a;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 16px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(circle at 20% 30%, rgba(155, 0, 255, 0.05) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0, 45, 255, 0.05) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
  animation: bgFloat 20s ease-in-out infinite;
}

@keyframes bgFloat {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(1%, -1%); }
}

.container { width:100%; max-width:520px; position: relative; z-index: 1; }

.header {
  text-align: center;
  padding: 24px 0 20px;
}

.header h1 {
  font-size: 2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}

.header .subtitle {
  font-size: 0.8rem;
  color: var(--text2);
  margin-top: 6px;
  letter-spacing: 1px;
}

.header .source-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  vertical-align: middle;
  margin-right: 4px;
}

.header .source-dot.live {
  background: #00ff88;
  box-shadow: 0 0 10px #00ff88;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

.price-card {
  background: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(199,62,29,0.06));
  border: 1px solid var(--primary-dark);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.price-card::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 140px;
  height: 140px;
  background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
  opacity: 0.12;
  border-radius: 50%;
  animation: priceGlow 4s ease-in-out infinite;
}

@keyframes priceGlow {
  0%, 100% { transform: scale(1); opacity: 0.08; }
  50% { transform: scale(1.1); opacity: 0.15; }
}

.price-label {
  font-size: 0.75rem;
  color: var(--primary-light);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.price-label .dot {
  width: 8px; height: 8px;
  background: #00ff88;
  border-radius: 50%;
  animation: pulse 2s infinite;
  box-shadow: 0 0 8px #00ff88;
}

.price-value {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--primary-light);
  line-height: 1;
  background: linear-gradient(135deg, var(--primary-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.price-value .unit {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--text2);
  margin-left: 4px;
  -webkit-text-fill-color: var(--text2);
}

.price-meta {
  font-size: 0.7rem;
  color: var(--text2);
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.refresh-btn {
  background: rgba(255,107,53,0.15);
  border: 1px solid var(--primary-dark);
  color: var(--primary-light);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 600;
}

.refresh-btn:hover {
  background: rgba(255,107,53,0.25);
  box-shadow: 0 0 15px rgba(255,107,53,0.3);
}

.refresh-btn:active { transform: scale(0.95); }

.manual-price {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  font-size: 0.75rem;
}

.manual-price input {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 8px;
  width: 120px;
  font-size: 0.8rem;
  text-align: center;
}

.manual-price input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
}

.manual-price button {
  background: var(--primary-dark);
  border: none;
  color: #fff;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 0.7rem;
  cursor: pointer;
  font-weight: 600;
}

.manual-price .toggle {
  font-size: 0.65rem;
  color: var(--primary-light);
  cursor: pointer;
  text-decoration: underline;
}

.calc-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  transition: all 0.3s;
}

.calc-card:hover {
  border-color: var(--primary-dark);
  box-shadow: 0 0 20px rgba(255,107,53,0.1);
}

.calc-card h2 {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.calc-card h2::before {
  content: '';
  width: 3px;
  height: 16px;
  background: linear-gradient(180deg, var(--primary), var(--primary-light));
  border-radius: 2px;
}

.calc-card h2 .icon { font-size: 1.2rem; }

.grade-section { margin-bottom: 20px; }

.grade-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}

.grade-label .name { font-size: 0.8rem; color: var(--text2); letter-spacing: 0.5px; }

.grade-label .value {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--primary-light);
  background: linear-gradient(135deg, var(--primary-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.grade-label .value .pct {
  font-size: 1rem;
  color: var(--text2);
  -webkit-text-fill-color: var(--text2);
}

.slider-wrap {
  position: relative;
  padding: 8px 0;
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 10px;
  border-radius: 5px;
  background: linear-gradient(90deg, var(--primary-dark), var(--primary), var(--gold));
  outline: none;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--primary-light);
  border: 3px solid #fff;
  cursor: pointer;
  box-shadow: 0 2px 12px var(--primary);
  transition: all 0.2s;
}

input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.1);
  box-shadow: 0 4px 20px var(--primary);
}

.grade-ticks {
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  color: var(--text2);
  padding: 4px 8px 0;
}

.grade-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.grade-presets button {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 600;
}

.grade-presets button:hover {
  border-color: var(--primary);
  color: var(--primary-light);
  background: rgba(255,107,53,0.1);
}

.grade-presets button.active {
  background: rgba(255,107,53,0.2);
  border-color: var(--primary);
  color: var(--primary-light);
  box-shadow: 0 0 10px rgba(255,107,53,0.2);
}

.coeff-display {
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--border);
}

.coeff-display .label { font-size: 0.8rem; color: var(--text2); letter-spacing: 0.5px; }

.coeff-display .value {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--accent);
  text-shadow: 0 0 10px rgba(0,240,255,0.2);
}

.result-card {
  background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(199,62,29,0.08));
  border: 2px solid var(--primary-dark);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.result-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
  opacity: 0.08;
  border-radius: 50%;
}

.result-card .label {
  font-size: 0.8rem;
  color: var(--primary-light);
  margin-bottom: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.result-card .value {
  font-size: 2.8rem;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 20px rgba(255,215,0,0.3);
  position: relative;
  z-index: 1;
}

.result-card .unit {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--text2);
}

.result-formula {
  font-size: 0.7rem;
  color: var(--text2);
  margin-top: 12px;
  line-height: 1.6;
}

.coeff-table-wrap {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s ease;
}

.coeff-table-wrap.open { max-height: 600px; }

.coeff-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem;
  margin-top: 12px;
}

.coeff-table th, .coeff-table td {
  padding: 10px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.coeff-table th {
  color: var(--text2);
  font-weight: 600;
  font-size: 0.7rem;
  background: var(--card2);
}

.coeff-table tr:hover td { background: rgba(255,107,53,0.08); }

.coeff-table tr.current td {
  background: rgba(255,107,53,0.18);
  color: var(--primary-light);
  font-weight: 700;
}

.toggle-table-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  color: var(--text2);
  padding: 10px;
  border-radius: 10px;
  font-size: 0.7rem;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.2s;
}

.toggle-table-btn:hover {
  border-color: var(--primary);
  color: var(--primary-light);
  background: rgba(255,107,53,0.05);
}

.multi-ores { margin-top: 20px; }

.multi-ores h3 {
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}

.ore-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
  padding: 12px;
  background: var(--card2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.ore-row:hover {
  border-color: var(--primary-dark);
}

.ore-row .ore-grade {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ore-row input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px;
  border-radius: 8px;
  width: 80px;
  font-size: 0.85rem;
  text-align: center;
  font-weight: 600;
}

.ore-row input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
}

.ore-row .ore-result {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--primary-light);
  min-width: 100px;
  text-align: right;
}

.ore-row .ore-del {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  font-size: 1.4rem;
  padding: 0 4px;
  line-height: 1;
}

.add-ore-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  color: var(--text2);
  padding: 10px;
  border-radius: 10px;
  font-size: 0.7rem;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all 0.2s;
}

.add-ore-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,240,255,0.05);
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  background: rgba(255,107,53,0.12);
  border-radius: var(--radius-sm);
  border: 1px solid var(--primary-dark);
}

.total-row .label { font-size: 0.85rem; color: var(--primary-light); font-weight: 600; }

.total-row .value {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--gold);
  text-shadow: 0 0 10px rgba(255,215,0,0.2);
}

.footer {
  text-align: center;
  padding: 20px 16px;
  font-size: 0.7rem;
  color: var(--text2);
  letter-spacing: 1px;
}

.footer span {
  font-weight: 900;
  color: var(--primary);
  font-size: 1.1rem;
}

.price-error {
  color: var(--danger);
  font-size: 0.7rem;
}

</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>锡矿石计价计算器</h1>
    <div class="subtitle">基于上期所沪锡期货 · 支持国内/进口双模式</div>
  </div>

  <div class="price-card">
    <div class="price-label"><span class="dot" id="statusDot"></span> <span id="priceLabel">SMM 1#电解锡（现货）</span></div>
    <div class="price-value" id="priceDisplay">--<span class="unit">元/吨</span></div>
    <div class="price-meta">
      <span id="priceTime">加载中...</span>
      <button class="refresh-btn" onclick="fetchPrice()">🔄 刷新</button>
    </div>
    <div class="manual-price" id="manualPriceRow" style="display:none">
      <span>手动输入:</span>
      <input type="number" id="manualPriceInput" placeholder="锡价 (元/吨)">
      <button onclick="setManualPrice()">确定</button>
    </div>
    <span class="toggle-manual" onclick="toggleManual()">或手动输入价格</span>
  </div>

  <div class="mode-toggle">
    <button class="active" onclick="switchMode('domestic')">🇨🇳 国内计价</button>
    <button onclick="switchMode('import')">🌍 进口计价</button>
  </div>

  <div class="import-fields" id="importFields">
    <div class="import-row">
      <label>LME锡价</label>
      <input type="number" id="lmePrice" value="53500" step="100" oninput="updateCalc()">
      <span class="unit">美元/吨</span>
    </div>
    <div class="import-row">
      <label>汇率</label>
      <input type="number" id="fxRate" value="7.25" step="0.01" oninput="updateCalc()">
      <span class="unit">USD/CNY</span>
    </div>
    <div class="import-row">
      <label>进口杂费</label>
      <input type="number" id="importFee" value="500" step="10" oninput="updateCalc()">
      <span class="unit">元/吨</span>
    </div>
  </div>

  <div class="calc-card">
    <h2><span class="icon">📐</span> 矿石计价计算</h2>
    <div class="grade-section">
      <div class="grade-label">
        <span class="name">锡矿石品位 (Sn%)</span>
        <span class="value" id="gradeValue">40<span class="pct">%</span></span>
      </div>
      <div class="slider-wrap">
        <input type="range" id="gradeSlider" min="10" max="65" value="40" step="0.1" oninput="updateCalc()">
      </div>
      <div class="grade-ticks"><span>10%</span><span>20%</span><span>30%</span><span>40%</span><span>50%</span><span>60%</span><span>65%</span></div>
      <div class="grade-presets" id="gradePresets"></div>
    </div>
    <div class="info-row">
      <span class="label">🔧 加工费 (TC)</span>
      <span class="value" id="tcValue">17,500 元/金属吨</span>
    </div>
    <div class="info-row">
      <span class="label">📊 锡计价系数</span>
      <span class="value" id="coeffValue">92.00%</span>
    </div>
  </div>

  <div class="result-card">
    <div class="label">💰 锡矿石单价</div>
    <div class="value" id="orePrice">--<span class="unit">元/吨</span></div>
    <div class="metal-ton" id="metalTonPrice"></div>
    <div class="result-formula" id="formulaDisplay"></div>
  </div>

  <button class="toggle-table-btn" onclick="toggleTable()">📋 查看锡品位-系数对应表</button>
  <div class="coeff-table-wrap" id="coeffTableWrap">
    <table class="coeff-table" id="coeffTable"></table>
    <div class="tc-note">⚠️ 系数含加工费、回收率等综合因素，仅供参考。实际成交以合同约定为准。<br>加工费基准：40%品位=17,500元/金属吨，60%品位=13,500元/金属吨（SMM 2026-07）</div>
  </div>

  <div class="footer">
    <span style="font-weight:900;color:#2196F3;font-size:1.5rem">矿链通1.0</span>
    <span style="font-weight:900;color:#2196F3;font-size:1.2rem">-佛山鑫善源</span>
  </div>
</div>

<script>
// 加工费参考表（元/金属吨）—— SMM 2026-07 基准
// 40%品位 = 17,500元/金属吨（云南）
// 60%品位 = 13,500元/金属吨（广西/江西/湖南）
// 10-20%低品位区间：TC加速上升（单位金属吨处理成本更高）
function getTC(grade) {
  if (grade >= 60) return 13500;
  if (grade >= 55) return 13700;
  if (grade >= 50) return 14000;
  if (grade >= 45) return 15000;
  if (grade >= 40) return 17500;
  // 20-40%: (22,000 → 17,500)
  if (grade >= 20) return Math.round(22000 + (17500 - 22000) * (grade - 20) / 20);
  // 10-20%: (27,000 → 22,000) 低品位TC加速
  if (grade >= 10) return Math.round(27000 + (22000 - 27000) * (grade - 10) / 10);
  return 27000;
}

var basePrice = 412550, manualOverride = false, currentMode = 'domestic';

// 锡计价系数 = (锡价 - 加工费) / 锡价 —— 行业标准净回值法
function getCoefficient(grade) {
  var price = getEffectivePrice();
  var tc = getTC(grade);
  return ((price - tc) / price) * 100;
}

function getEffectivePrice() {
  if (currentMode === 'import') {
    var lme = parseFloat(document.getElementById('lmePrice').value) || 53500;
    var fx = parseFloat(document.getElementById('fxRate').value) || 7.25;
    var fee = parseFloat(document.getElementById('importFee').value) || 500;
    return lme * fx + fee;
  }
  return basePrice;
}

function updateCalc() {
  var grade = parseFloat(document.getElementById('gradeSlider').value);
  var price = getEffectivePrice();
  var tc = getTC(grade);
  var metalTonPrice = price - tc;              // 净回值：元/金属吨
  var orePrice = metalTonPrice * (grade / 100); // 矿石单价：元/吨矿
  var coeff = (metalTonPrice / price) * 100;   // 计价系数

  document.getElementById('gradeValue').innerHTML = grade.toFixed(1) + '<span class="pct">%</span>';
  document.getElementById('coeffValue').textContent = coeff.toFixed(2) + '%';
  document.getElementById('tcValue').textContent = tc.toLocaleString() + ' 元/金属吨';
  document.getElementById('orePrice').innerHTML = Math.round(orePrice).toLocaleString() + '<span class="unit">元/吨</span>';
  document.getElementById('metalTonPrice').textContent =
    '净回值 ≈ ' + Math.round(metalTonPrice).toLocaleString() + ' 元/金属吨（' + price.toLocaleString() + ' - ' + tc.toLocaleString() + ' = ' + Math.round(metalTonPrice).toLocaleString() + '）';

  var modeLabel = currentMode === 'import' ? 'LME×汇率+杂费' : '沪锡结算价';
  document.getElementById('formulaDisplay').textContent =
    '(' + price.toLocaleString() + ' - ' + tc.toLocaleString() + ') × ' + grade.toFixed(1) +
    '% = ' + Math.round(orePrice).toLocaleString() + ' 元/吨  [' + modeLabel + ']';

  updatePresetButtons(grade);
  highlightTableRow(grade);
}

function highlightTableRow(grade) {
  document.querySelectorAll('#coeffTable tr').forEach(function(r) { r.classList.remove('current'); });
  document.querySelectorAll('#coeffTable tr').forEach(function(r) {
    var cells = r.querySelectorAll('td');
    if (cells.length > 0 && parseInt(cells[0].textContent) === Math.round(grade)) r.classList.add('current');
  });
}

function switchMode(mode) {
  currentMode = mode;
  var btns = document.querySelectorAll('.mode-toggle button');
  btns[0].classList.toggle('active', mode === 'domestic');
  btns[1].classList.toggle('active', mode === 'import');
  document.getElementById('importFields').classList.toggle('show', mode === 'import');
  document.getElementById('priceLabel').textContent = mode === 'import' ? 'LME锡 (3M) → 沪锡等价' : 'SMM 1#电解锡（现货）';
  updateCalc();
}

function fetchPrice() {
  var d = document.getElementById('priceDisplay'), t = document.getElementById('priceTime'), dot = document.getElementById('statusDot');
  d.innerHTML = '<span style="font-size:1rem">⏳</span>';
  if (dot) dot.className = 'dot';
  fetch('data/price.json?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!manualOverride && data.price > 0) basePrice = data.price;
      d.innerHTML = basePrice.toLocaleString() + '<span class="unit">元/吨</span>';
      t.textContent = '更新于 ' + (data.updated_at || data.date || '');
      if (dot) dot.className = 'dot';
      if (!manualOverride) updateCalc();
    })
    .catch(function() {
      d.innerHTML = basePrice.toLocaleString() + '<span class="unit">元/吨</span>';
      t.innerHTML = '<span class="price-error">离线 · 默认参考价</span>';
      if (dot) dot.className = 'dot offline';
      updateCalc();
    });
}

function setManualPrice() {
  var val = parseFloat(document.getElementById('manualPriceInput').value);
  if (val > 0) {
    basePrice = val; manualOverride = true;
    document.getElementById('priceDisplay').innerHTML = val.toLocaleString() + '<span class="unit">元/吨</span>';
    document.getElementById('priceTime').textContent = '手动输入价格';
    document.getElementById('statusDot').className = 'dot offline';
    updateCalc();
  }
}

function toggleManual() {
  var row = document.getElementById('manualPriceRow');
  row.style.display = 'flex';
  event.target.style.display = 'none';
}

function buildPresetButtons() {
  var container = document.getElementById('gradePresets');
  [10, 20, 30, 40, 50, 60, 65].forEach(function(g) {
    var btn = document.createElement('button');
    btn.textContent = g + '%';
    btn.onclick = function() { document.getElementById('gradeSlider').value = g; updateCalc(); };
    container.appendChild(btn);
  });
}

function updatePresetButtons(grade) {
  document.querySelectorAll('#gradePresets button').forEach(function(btn) {
    btn.classList.toggle('active', Math.abs(parseInt(btn.textContent) - grade) < 0.05);
  });
}

function buildCoeffTable() {
  var table = document.getElementById('coeffTable');
  var grades = [10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60, 65];
  var html = '<tr><th>Sn%</th><th>加工费(元/金属吨)</th><th>净回值系数</th><th>Sn%</th><th>加工费(元/金属吨)</th><th>净回值系数</th></tr>';
  var half = Math.ceil(grades.length / 2);
  for (var i = 0; i < half; i++) {
    var gLeft = grades[i], gRight = grades[i + half];
    var tcLeft = getTC(gLeft), tcRight = gRight ? getTC(gRight) : 0;
    var coeffLeft = getCoefficient(gLeft), coeffRight = gRight ? getCoefficient(gRight) : 0;
    html += '<tr><td>' + gLeft + '%</td><td>' + tcLeft.toLocaleString() + '</td><td>' + coeffLeft.toFixed(2) + '%</td>';
    if (gRight) html += '<td>' + gRight + '%</td><td>' + tcRight.toLocaleString() + '</td><td>' + coeffRight.toFixed(2) + '%</td>';
    else html += '<td></td><td></td><td></td>';
    html += '</tr>';
  }
  table.innerHTML = html;
}

function toggleTable() { document.getElementById('coeffTableWrap').classList.toggle('open'); }

function init() { buildPresetButtons(); buildCoeffTable(); updateCalc(); fetchPrice(); setInterval(fetchPrice, 60000); }
init();
</script>
</body>
</html>
