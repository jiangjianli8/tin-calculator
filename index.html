<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>锡矿石计价器 · 鑫善源 ⬜</title>
<style>

/* ===== 全局变量 - 锡矿石计价器霓虹主题 ===== */
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #1a1a25;
  --bg-card-hover: #1f1f2e;
  --border-glow: #8a9bb580;
  --neon-purple: #8a9bb5;
  --neon-blue: #4a5568;
  --neon-cyan: #b0c4de;
  --neon-green: #a0a0c0;
  --neon-pink: #ff0080;
  --neon-gold: #ffd700;
  --text-primary: #ffffff;
  --text-secondary: #a0a0c0;
  --text-muted: #606080;
  --success: #a0a0c0;
  --danger: #ff4466;
  --warning: #ffaa00;
  --radius-lg: 16px;
  --radius-md: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  background: var(--bg-primary);
  min-height: 100vh;
  color: var(--text-primary);
  padding-bottom: 40px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(circle at 20% 30%, rgba(155, 0, 255, 0.06) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0, 45, 255, 0.06) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
  animation: bgFloat 20s ease-in-out infinite;
}

@keyframes bgFloat {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(2%, -2%) rotate(1deg); }
  66% { transform: translate(-2%, 2%) rotate(-1deg); }
}

.header {
  background: linear-gradient(135deg, rgba(155, 0, 255, 0.12) 0%, rgba(0, 45, 255, 0.12) 100%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(155, 0, 255, 0.25);
  color: #fff;
  padding: 20px 16px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 30px rgba(155, 0, 255, 0.15);
}

.header h1 {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan), var(--neon-blue));
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 3s ease infinite;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.header .sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.header .brand {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.source-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  vertical-align: middle;
}

.source-dot.live {
  background: var(--neon-green);
  box-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
  animation: pulse 2s ease-in-out infinite;
}

.source-dot.delayed {
  background: var(--warning);
  box-shadow: 0 0 8px var(--warning);
}

.source-dot.offline {
  background: var(--text-muted);
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.2); }
}

.container {
  padding: 16px 12px;
  max-width: 500px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.card {
  background: var(--bg-card);
  border: 1px solid rgba(155, 0, 255, 0.15);
  border-radius: var(--radius-lg);
  padding: 18px 16px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(155, 0, 255, 0.08), transparent);
  transition: left 0.6s ease;
}

.card:hover::before { left: 100%; }

.card:hover {
  border-color: rgba(155, 0, 255, 0.4);
  box-shadow: 0 0 20px rgba(155, 0, 255, 0.15), 0 8px 32px rgba(0, 0, 0, 0.4);
  transform: translateY(-2px);
}

.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.card-title::before {
  content: '';
  width: 3px;
  height: 16px;
  background: linear-gradient(180deg, var(--neon-purple), var(--neon-cyan));
  border-radius: 2px;
}

.price-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, rgba(155, 0, 255, 0.08) 0%, rgba(0, 45, 255, 0.08) 100%);
  border: 1px solid rgba(155, 0, 255, 0.2);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}

.price-bar::after {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 150px;
  height: 150px;
  background: radial-gradient(circle, rgba(0, 240, 255, 0.12) 0%, transparent 70%);
  border-radius: 50%;
  animation: priceGlow 4s ease-in-out infinite;
}

@keyframes priceGlow {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.1); opacity: 0.8; }
}

.price-bar .price {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  z-index: 1;
}

.price-bar .change {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 6px;
  position: relative;
  z-index: 1;
}

.price-bar .change.up {
  color: var(--danger);
  background: rgba(255, 68, 102, 0.12);
  border: 1px solid rgba(255, 68, 102, 0.25);
}

.price-bar .change.down {
  color: var(--success);
  background: rgba(0, 255, 136, 0.12);
  border: 1px solid rgba(0, 255, 136, 0.25);
}

.price-bar .status {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 700;
  position: relative;
  z-index: 1;
}

.price-bar .status.realtime {
  background: rgba(0, 240, 255, 0.12);
  color: var(--neon-cyan);
  border: 1px solid rgba(0, 240, 255, 0.25);
}

.price-bar .status.closed {
  background: rgba(96, 96, 128, 0.15);
  color: var(--text-muted);
  border: 1px solid rgba(96, 96, 128, 0.25);
}

.price-bar .refresh {
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
  color: #fff;
  border: none;
  transition: all 0.3s ease;
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 36px;
  min-height: 36px;
}

.price-bar .refresh:hover {
  box-shadow: 0 0 20px rgba(155, 0, 255, 0.4);
  transform: scale(1.05);
}

.price-bar .refresh:active { transform: scale(0.95); }

.price-bar .refresh.loading { animation: spin 1s linear infinite; }

@keyframes spin { to { transform: rotate(360deg); } }

.quick-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.preset-chip {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  background: rgba(96, 96, 128, 0.15);
  color: var(--text-secondary);
  border: 1.5px solid rgba(96, 96, 128, 0.25);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.preset-chip:hover {
  background: rgba(155, 0, 255, 0.12);
  border-color: rgba(155, 0, 255, 0.35);
  color: var(--text-primary);
  transform: translateY(-1px);
}

.preset-chip.active {
  background: linear-gradient(135deg, rgba(155, 0, 255, 0.25), rgba(0, 45, 255, 0.25));
  border-color: var(--neon-purple);
  color: var(--text-primary);
  box-shadow: 0 0 15px rgba(155, 0, 255, 0.25);
}

.form-row { display: flex; gap: 10px; margin-bottom: 10px; }
.form-row .field { flex: 1; }
.field { margin-bottom: 10px; }

.field label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.field label span {
  font-weight: 400;
  color: var(--text-muted);
  font-size: 11px;
}

.field .input-wrap { position: relative; }

.field input {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-secondary);
  border: 1.5px solid rgba(96, 96, 128, 0.25);
  border-radius: var(--radius-md);
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  outline: none;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.field input:hover { border-color: rgba(155, 0, 255, 0.35); }

.field input:focus {
  border-color: var(--neon-purple);
  box-shadow: 0 0 0 3px rgba(155, 0, 255, 0.12), 0 0 20px rgba(155, 0, 255, 0.15);
  background: var(--bg-card);
}

.field .suffix {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
  pointer-events: none;
}

.note {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 6px;
  padding-left: 4px;
}

.btn-group {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}

.btn {
  flex: 1;
  padding: 14px 0;
  border: none;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  text-align: center;
  position: relative;
  overflow: hidden;
  letter-spacing: 1px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
  color: #fff;
  border: 2px solid var(--neon-purple);
}

.btn-primary::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  display: block;
  border-radius: 50px;
  background: rgba(255, 255, 255, 0.12);
  width: 50px;
  height: 50px;
  transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.btn-primary:hover::before {
  width: 100%;
  background: rgba(255, 255, 255, 0.08);
}

.btn-primary:hover {
  box-shadow: 0 0 30px rgba(155, 0, 255, 0.4), 0 0 60px rgba(0, 45, 255, 0.25);
  transform: translateY(-2px);
}

.btn-primary:active { transform: scale(0.97); }

.btn-success {
  background: transparent;
  color: var(--neon-cyan);
  border: 2px solid var(--neon-cyan);
}

.btn-success::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  display: block;
  border-radius: 50px;
  background: rgba(0, 240, 255, 0.08);
  width: 50px;
  height: 50px;
  transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.btn-success:hover::before {
  width: 100%;
  background: rgba(0, 240, 255, 0.12);
}

.btn-success:hover {
  box-shadow: 0 0 30px rgba(0, 240, 255, 0.35), inset 0 0 20px rgba(0, 240, 255, 0.08);
  transform: translateY(-2px);
}

.btn-success:active { transform: scale(0.97); }

.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.tag-6 { background: rgba(0, 240, 255, 0.12); color: var(--neon-cyan); border: 1px solid rgba(0, 240, 255, 0.25); }
.tag-5 { background: rgba(0, 255, 136, 0.12); color: var(--neon-green); border: 1px solid rgba(0, 255, 136, 0.25); }
.tag-4 { background: rgba(255, 170, 0, 0.12); color: var(--warning); border: 1px solid rgba(255, 170, 0, 0.25); }
.tag-3 { background: rgba(255, 0, 128, 0.12); color: #ff0080; border: 1px solid rgba(255, 0, 128, 0.25); }
.tag-2 { background: rgba(255, 215, 0, 0.12); color: #ffd700; border: 1px solid rgba(255, 215, 0, 0.25); }
.tag-1 { background: rgba(255, 68, 102, 0.12); color: var(--danger); border: 1px solid rgba(255, 68, 102, 0.25); }

.result-card {
  background: var(--bg-card);
  border: 1px solid rgba(0, 240, 255, 0.15);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 14px;
  display: none;
  position: relative;
}

.result-card.show {
  display: block;
  animation: fadeInUp 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-header {
  background: linear-gradient(135deg, rgba(155, 0, 255, 0.15) 0%, rgba(0, 45, 255, 0.15) 100%);
  color: var(--text-primary);
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(155, 0, 255, 0.15);
  letter-spacing: 1px;
}

.result-body { padding: 12px 16px; }

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(96, 96, 128, 0.12);
  font-size: 13px;
}

.result-row:last-child { border-bottom: none; }

.result-label { color: var(--text-secondary); font-weight: 500; }
.result-val { font-weight: 800; color: var(--text-primary); }

.result-val.big {
  font-size: 22px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.result-val.dun {
  color: var(--neon-green);
  text-shadow: 0 0 10px rgba(0, 255, 136, 0.25);
}

.result-val.usd {
  color: #ffd700;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.25);
}

.copy-btn {
  background: rgba(96, 96, 128, 0.15);
  border: 1px solid rgba(96, 96, 128, 0.25);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 11px;
  color: var(--text-secondary);
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease;
}

.copy-btn:hover {
  background: rgba(155, 0, 255, 0.15);
  border-color: var(--neon-purple);
  color: var(--text-primary);
}

.copy-btn:active { transform: scale(0.95); }

.error-box {
  background: rgba(255, 68, 102, 0.08);
  border: 1px solid rgba(255, 68, 102, 0.25);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--danger);
  display: none;
  animation: shake 0.5s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.history-card {
  background: var(--bg-card);
  border: 1px solid rgba(96, 96, 128, 0.15);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  margin-bottom: 14px;
  display: none;
}

.history-card.show {
  display: block;
  animation: fadeInUp 0.5s ease;
}

.history-card h3 {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.history-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(96, 96, 128, 0.12);
  font-size: 12px;
}

.history-item .h-price { font-weight: 800; color: var(--neon-cyan); }
.history-item .h-time { color: var(--text-muted); font-size: 11px; }
.history-item:last-child { border-bottom: none; }

.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
  color: #fff;
  padding: 10px 24px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  z-index: 999;
  pointer-events: none;
  box-shadow: 0 4px 20px rgba(155, 0, 255, 0.35);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.footer {
  text-align: center;
  padding: 16px;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

@media (min-width: 480px) {
  .container { padding: 20px 16px; }
}

</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⬜ 锡矿石计价器</h1>
    <div class="subtitle">基于上期所沪锡期货 · 支持国内/进口双模式</div>
  </div>

  <div class="price-card">
    <div class="price-label"><span class="dot" id="statusDot"></span> <span id="priceLabel">SMM 1#电解锡（现货）</span></div>
    <div class="price-value" id="priceDisplay">--<span class="unit">元/吨</span></div>
    <div class="price-meta">
      <span id="priceTime">加载中...</span>
      <button class="refresh-btn" onclick="fetchPrice()">🔄 刷新</button>
    </div>
    <div class="manual-price" id="manualPriceRow" style="display:none">
      <span>手动输入:</span>
      <input type="number" id="manualPriceInput" placeholder="锡价 (元/吨)">
      <button onclick="setManualPrice()">确定</button>
    </div>
    <span class="toggle-manual" onclick="toggleManual()">或手动输入价格</span>
  </div>

  <div class="mode-toggle">
    <button class="active" onclick="switchMode('domestic')">🇨🇳 国内计价</button>
    <button onclick="switchMode('import')">🌍 进口计价</button>
  </div>

  <div class="import-fields" id="importFields">
    <div class="import-row">
      <label>LME锡价</label>
      <input type="number" id="lmePrice" value="53500" step="100" oninput="updateCalc()">
      <span class="unit">美元/吨</span>
    </div>
    <div class="import-row">
      <label>汇率</label>
      <input type="number" id="fxRate" value="7.25" step="0.01" oninput="updateCalc()">
      <span class="unit">USD/CNY</span>
    </div>
    <div class="import-row">
      <label>进口杂费</label>
      <input type="number" id="importFee" value="500" step="10" oninput="updateCalc()">
      <span class="unit">元/吨</span>
    </div>
  </div>

  <div class="calc-card">
    <h2><span class="icon">📐</span> 矿石计价计算</h2>
    <div class="grade-section">
      <div class="grade-label">
        <span class="name">锡矿石品位 (Sn%)</span>
        <span class="value" id="gradeValue">40<span class="pct">%</span></span>
      </div>
      <div class="slider-wrap">
        <input type="range" id="gradeSlider" min="10" max="65" value="40" step="0.1" oninput="updateCalc()">
      </div>
      <div class="grade-ticks"><span>10%</span><span>20%</span><span>30%</span><span>40%</span><span>50%</span><span>60%</span><span>65%</span></div>
      <div class="grade-presets" id="gradePresets"></div>
    </div>
    <div class="info-row">
      <span class="label">🔧 加工费 (TC)</span>
      <span class="value" id="tcValue">17,500 元/金属吨</span>
    </div>
    <div class="info-row">
      <span class="label">📊 锡计价系数</span>
      <span class="value" id="coeffValue">92.00%</span>
    </div>
  </div>

  <div class="result-card">
    <div class="label">💰 锡矿石单价</div>
    <div class="value" id="orePrice">--<span class="unit">元/吨</span></div>
    <div class="metal-ton" id="metalTonPrice"></div>
    <div class="result-formula" id="formulaDisplay"></div>
  </div>

  <button class="toggle-table-btn" onclick="toggleTable()">📋 查看锡品位-系数对应表</button>
  <div class="coeff-table-wrap" id="coeffTableWrap">
    <table class="coeff-table" id="coeffTable"></table>
    <div class="tc-note">⚠️ 系数含加工费、回收率等综合因素，仅供参考。实际成交以合同约定为准。<br>加工费基准：40%品位=17,500元/金属吨，60%品位=13,500元/金属吨（SMM 2026-07）</div>
  </div>

  <div class="footer">
    <span style="font-weight:900;color:#2196F3;font-size:1.5rem">矿链通1.0</span>
    <span style="font-weight:900;color:#2196F3;font-size:1.2rem">-佛山鑫善源</span>
  </div>
</div>

<script>
// 加工费参考表（元/金属吨）—— SMM 2026-07 基准
// 40%品位 = 17,500元/金属吨（云南）
// 60%品位 = 13,500元/金属吨（广西/江西/湖南）
// 10-20%低品位区间：TC加速上升（单位金属吨处理成本更高）
function getTC(grade) {
  if (grade >= 60) return 13500;
  if (grade >= 55) return 13700;
  if (grade >= 50) return 14000;
  if (grade >= 45) return 15000;
  if (grade >= 40) return 17500;
  // 20-40%: (22,000 → 17,500)
  if (grade >= 20) return Math.round(22000 + (17500 - 22000) * (grade - 20) / 20);
  // 10-20%: (27,000 → 22,000) 低品位TC加速
  if (grade >= 10) return Math.round(27000 + (22000 - 27000) * (grade - 10) / 10);
  return 27000;
}

var basePrice = 412550, manualOverride = false, currentMode = 'domestic';

// 锡计价系数 = (锡价 - 加工费) / 锡价 —— 行业标准净回值法
function getCoefficient(grade) {
  var price = getEffectivePrice();
  var tc = getTC(grade);
  return ((price - tc) / price) * 100;
}

function getEffectivePrice() {
  if (currentMode === 'import') {
    var lme = parseFloat(document.getElementById('lmePrice').value) || 53500;
    var fx = parseFloat(document.getElementById('fxRate').value) || 7.25;
    var fee = parseFloat(document.getElementById('importFee').value) || 500;
    return lme * fx + fee;
  }
  return basePrice;
}

function updateCalc() {
  var grade = parseFloat(document.getElementById('gradeSlider').value);
  var price = getEffectivePrice();
  var tc = getTC(grade);
  var metalTonPrice = price - tc;              // 净回值：元/金属吨
  var orePrice = metalTonPrice * (grade / 100); // 矿石单价：元/吨矿
  var coeff = (metalTonPrice / price) * 100;   // 计价系数

  document.getElementById('gradeValue').innerHTML = grade.toFixed(1) + '<span class="pct">%</span>';
  document.getElementById('coeffValue').textContent = coeff.toFixed(2) + '%';
  document.getElementById('tcValue').textContent = tc.toLocaleString() + ' 元/金属吨';
  document.getElementById('orePrice').innerHTML = Math.round(orePrice).toLocaleString() + '<span class="unit">元/吨</span>';
  document.getElementById('metalTonPrice').textContent =
    '净回值 ≈ ' + Math.round(metalTonPrice).toLocaleString() + ' 元/金属吨（' + price.toLocaleString() + ' - ' + tc.toLocaleString() + ' = ' + Math.round(metalTonPrice).toLocaleString() + '）';

  var modeLabel = currentMode === 'import' ? 'LME×汇率+杂费' : '沪锡结算价';
  document.getElementById('formulaDisplay').textContent =
    '(' + price.toLocaleString() + ' - ' + tc.toLocaleString() + ') × ' + grade.toFixed(1) +
    '% = ' + Math.round(orePrice).toLocaleString() + ' 元/吨  [' + modeLabel + ']';

  updatePresetButtons(grade);
  highlightTableRow(grade);
}

function highlightTableRow(grade) {
  document.querySelectorAll('#coeffTable tr').forEach(function(r) { r.classList.remove('current'); });
  document.querySelectorAll('#coeffTable tr').forEach(function(r) {
    var cells = r.querySelectorAll('td');
    if (cells.length > 0 && parseInt(cells[0].textContent) === Math.round(grade)) r.classList.add('current');
  });
}

function switchMode(mode) {
  currentMode = mode;
  var btns = document.querySelectorAll('.mode-toggle button');
  btns[0].classList.toggle('active', mode === 'domestic');
  btns[1].classList.toggle('active', mode === 'import');
  document.getElementById('importFields').classList.toggle('show', mode === 'import');
  document.getElementById('priceLabel').textContent = mode === 'import' ? 'LME锡 (3M) → 沪锡等价' : 'SMM 1#电解锡（现货）';
  updateCalc();
}

function fetchPrice() {
  var d = document.getElementById('priceDisplay'), t = document.getElementById('priceTime'), dot = document.getElementById('statusDot');
  d.innerHTML = '<span style="font-size:1rem">⏳</span>';
  if (dot) dot.className = 'dot';
  fetch('data/price.json?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!manualOverride && data.price > 0) basePrice = data.price;
      d.innerHTML = basePrice.toLocaleString() + '<span class="unit">元/吨</span>';
      t.textContent = '更新于 ' + (data.updated_at || data.date || '');
      if (dot) dot.className = 'dot';
      if (!manualOverride) updateCalc();
    })
    .catch(function() {
      d.innerHTML = basePrice.toLocaleString() + '<span class="unit">元/吨</span>';
      t.innerHTML = '<span class="price-error">离线 · 默认参考价</span>';
      if (dot) dot.className = 'dot offline';
      updateCalc();
    });
}

function setManualPrice() {
  var val = parseFloat(document.getElementById('manualPriceInput').value);
  if (val > 0) {
    basePrice = val; manualOverride = true;
    document.getElementById('priceDisplay').innerHTML = val.toLocaleString() + '<span class="unit">元/吨</span>';
    document.getElementById('priceTime').textContent = '手动输入价格';
    document.getElementById('statusDot').className = 'dot offline';
    updateCalc();
  }
}

function toggleManual() {
  var row = document.getElementById('manualPriceRow');
  row.style.display = 'flex';
  event.target.style.display = 'none';
}

function buildPresetButtons() {
  var container = document.getElementById('gradePresets');
  [10, 20, 30, 40, 50, 60, 65].forEach(function(g) {
    var btn = document.createElement('button');
    btn.textContent = g + '%';
    btn.onclick = function() { document.getElementById('gradeSlider').value = g; updateCalc(); };
    container.appendChild(btn);
  });
}

function updatePresetButtons(grade) {
  document.querySelectorAll('#gradePresets button').forEach(function(btn) {
    btn.classList.toggle('active', Math.abs(parseInt(btn.textContent) - grade) < 0.05);
  });
}

function buildCoeffTable() {
  var table = document.getElementById('coeffTable');
  var grades = [10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60, 65];
  var html = '<tr><th>Sn%</th><th>加工费(元/金属吨)</th><th>净回值系数</th><th>Sn%</th><th>加工费(元/金属吨)</th><th>净回值系数</th></tr>';
  var half = Math.ceil(grades.length / 2);
  for (var i = 0; i < half; i++) {
    var gLeft = grades[i], gRight = grades[i + half];
    var tcLeft = getTC(gLeft), tcRight = gRight ? getTC(gRight) : 0;
    var coeffLeft = getCoefficient(gLeft), coeffRight = gRight ? getCoefficient(gRight) : 0;
    html += '<tr><td>' + gLeft + '%</td><td>' + tcLeft.toLocaleString() + '</td><td>' + coeffLeft.toFixed(2) + '%</td>';
    if (gRight) html += '<td>' + gRight + '%</td><td>' + tcRight.toLocaleString() + '</td><td>' + coeffRight.toFixed(2) + '%</td>';
    else html += '<td></td><td></td><td></td>';
    html += '</tr>';
  }
  table.innerHTML = html;
}

function toggleTable() { document.getElementById('coeffTableWrap').classList.toggle('open'); }

function init() { buildPresetButtons(); buildCoeffTable(); updateCalc(); fetchPrice(); setInterval(fetchPrice, 60000); }
init();
</script>
</body>
</html>
